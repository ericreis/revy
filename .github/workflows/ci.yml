name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips dependency lifecycle scripts, which are not
        # needed here (esbuild/rollup/rolldown ship prebuilt platform binaries,
        # and Playwright browsers are installed by the dedicated step below).
        # esbuild's postinstall in particular hangs npm ci on fresh runners.
        # This is also the safer default against supply-chain postinstall abuse.
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
